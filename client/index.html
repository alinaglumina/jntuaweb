<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jawaharlal Nehru Technological University Anantapur — official portal for admissions, examinations, results, research and academics." />
    <meta name="theme-color" content="#003087" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f121a" media="(prefers-color-scheme: dark)" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="JNTU Anantapur" />
    <meta property="og:title" content="Jawaharlal Nehru Technological University Anantapur" />
    <meta property="og:description" content="Official portal — admissions, examinations, results, research and academics." />
    <meta name="twitter:card" content="summary" />
    <!-- Apply saved/OS theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('jntua-theme');
          if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (t === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <title>JNTUA — Jawaharlal Nehru Technological University Anantapur</title>
  </head>
