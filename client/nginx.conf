server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — every route resolves to index.html.
  location / { try_files $uri $uri/ /index.html; }

  # Proxy API + uploads to the Express service (compose network name: api).
  location /api/     { proxy_pass http://api:5000; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header Cookie $http_cookie; }
  location /uploads/ { proxy_pass http://api:5000; }

  location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|webp)$ { expires 7d; add_header Cache-Control "public"; }
}
