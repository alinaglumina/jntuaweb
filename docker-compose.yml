services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes: [mongo_data:/data/db]
    ports: ["27017:27017"]

  api:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    depends_on: [mongo]
    environment:
      - MONGO_URI=mongodb://mongo:27017/jntuaweb
      - SITE_URL=${SITE_URL:-http://localhost:8080}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - uploads_data:/app/uploads
    ports: ["5000:5000"]

  web:
    build: ./client
    restart: unless-stopped
    depends_on: [api]
    ports: ["8080:80"]

volumes:
  mongo_data:
  uploads_data:
