# Production reverse proxy (single droplet: PM2 runs the API on :5000, Nginx
# serves the built client). Terminate TLS with certbot, then this redirects 80→443.
server {
  listen 80;
  server_name jntuaweb.jntua.ac.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name jntuaweb.jntua.ac.in;

  # ssl_certificate     /etc/letsencrypt/live/jntuaweb.jntua.ac.in/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/jntuaweb.jntua.ac.in/privkey.pem;

  root /var/www/jntuaweb/client/dist;
  index index.html;
  client_max_body_size 25M;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  location / { try_files $uri $uri/ /index.html; }

  location /api/ {
    proxy_pass http://127.0.0.1:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
  }
  # SEO endpoints served dynamically by the Node backend.
  location = /sitemap.xml { proxy_pass http://127.0.0.1:5000; }
  location = /robots.txt  { proxy_pass http://127.0.0.1:5000; }

  location /uploads/ { proxy_pass http://127.0.0.1:5000; expires 7d; add_header Cache-Control "public"; }

  location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|webp)$ { expires 30d; add_header Cache-Control "public, immutable"; }
}
